name: Daily Recommendation CSV

on:
  schedule:
    - cron: "0 5 * * 1-5" # 10:30 AM IST
    - cron: "0 9 * * 1-5" # 2:30 PM IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  recommendation-csv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Capture top-gainer targets, expert, and portfolio recommendations
        run: |
          if [ "${{ github.event.schedule }}" = "0 9 * * 1-5" ]; then
            node scripts/update_daily_recommendations.mjs --slot afternoon
          else
            node scripts/update_daily_recommendations.mjs --slot morning
          fi

      - name: Commit CSV update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update daily recommendation CSV"
          file_pattern: data/daily_recommendations.csv
