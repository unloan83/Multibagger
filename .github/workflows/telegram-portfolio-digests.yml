name: Telegram Portfolio Digests

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/telegram-portfolio-digests.yml"
      - "lib/google-credentials.ts"
      - "lib/google-sheets.ts"
      - "scripts/send_telegram_digests.ts"
  schedule:
    - cron: "45 4 * * 1-5"
    - cron: "0 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: telegram-portfolio-digests
  cancel-in-progress: false

jobs:
  send-digests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Send configured Telegram portfolio digests
        run: npx tsx scripts/send_telegram_digests.ts
        env:
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_ENCRYPTION_SECRET: ${{ secrets.TELEGRAM_ENCRYPTION_SECRET }}
          DASHBOARD_SESSION_SECRET: ${{ secrets.DASHBOARD_SESSION_SECRET }}
