name: Wealth Recommendation Snapshot

on:
  schedule:
    - cron: "20 4 * * 1-5"
    - cron: "30 10 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync official NIFTY 500 universe
        run: npm run universe:sync

      - name: Generate safety-gated recommendation snapshot
        run: npm run wealth:snapshot

      - name: Commit updated universe and snapshot
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update wealth recommendation snapshot"
          file_pattern: data/market-universe.json data/wealth_recommendations.json
